name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required standard files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "AGENTS.md"
            "TESTING_GUIDE.md"
            "SECURITY_REVIEW.md"
            "CODE_REVIEW.md"
            "CONTRIBUTING.md"
            "SECURITY.md"
            ".github/pull_request_template.md"
          )
          for file in "${required[@]}"; do
            test -s "$file" || { echo "Missing or empty: $file"; exit 1; }
          done

  project-checks:
    name: Project checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace with stack-specific setup
        shell: bash
        run: |
          echo "Customize this workflow for your stack."
          echo "Examples: npm ci && npm test, pytest, go test ./..., cargo test"

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

